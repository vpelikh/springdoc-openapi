name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.adoc'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.adoc'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 25 ]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build with Maven
        run: ./mvnw --no-transfer-progress -B -T 1C install --file pom.xml

      - name: Deploy SNAPSHOT to Maven Central (only on push to main with Java 17)
        if: github.event_name == 'push' && matrix.java == 17
        run: |
          MY_POM_VERSION=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version --non-recursive)
          echo "POM VERSION: $MY_POM_VERSION"
          if [[ $MY_POM_VERSION =~ ^.*SNAPSHOT$ ]]; then
            ./mvnw --no-transfer-progress -B -T 1C clean deploy -e
          else
            echo "Not a SNAPSHOT version, skipping deployment."
          fi
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}